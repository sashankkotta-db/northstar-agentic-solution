# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Databricks Apps reads the runtime env BELOW from this file (not from
# databricks.yml's config block — that only drives resource grants). The REPLACE_WITH_*
# values are placeholders kept scrubbed for git; deployment/deploy.sh injects the real
# values from deployment/config.env at deploy time and restores the placeholders after.
# So: edit deployment/config.env, NOT these lines.
# ─────────────────────────────────────────────────────────────────────────────
command: ["uv", "run", "start-server"]
# backend-only: the FastAPI app serves the custom 2-tab UI (Dashboard + Assistant) + /invocations
# databricks apps listen by default on port 8000

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_EXPERIMENT_ID
    valueFrom: "experiment"
  # --- Agent configuration ---
  - name: MODEL_ENDPOINT
    value: "databricks-claude-sonnet-4-5"
  - name: GENIE_SPACE_ID
    value: "REPLACE_WITH_GENIE_SPACE_ID"
  - name: VS_CATALOG
    value: "REPLACE_WITH_CATALOG"
  - name: VS_SCHEMA
    value: "northstar_cpg"
  - name: WAREHOUSE_ID
    value: "REPLACE_WITH_WAREHOUSE_ID"
  # --- Lakebase long-term memory ---
  - name: LAKEBASE_INSTANCE_NAME
    valueFrom: "database"
  - name: EMBEDDING_ENDPOINT
    value: "databricks-gte-large-en"
  - name: EMBEDDING_DIMS
    value: "1024"
