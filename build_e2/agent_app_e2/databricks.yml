bundle:
  name: northstar_brand_copilot

resources:
  apps:
    agent_langgraph:
      name: "northstar-brand-copilot"
      description: "NorthStar Brand Copilot — CPG brand & sales assistant (LangGraph + Genie + Vector Search + Lakebase)"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-server"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          # --- Agent configuration ---
          - name: MODEL_ENDPOINT
            value: "databricks-claude-sonnet-4-5"
          - name: GENIE_SPACE_ID
            value: "REPLACE_WITH_GENIE_SPACE_ID"
          - name: VS_CATALOG
            value: "REPLACE_WITH_CATALOG"
          - name: VS_SCHEMA
            value: "northstar_cpg"
          - name: WAREHOUSE_ID
            value: "REPLACE_WITH_WAREHOUSE_ID"
          # --- Lakebase long-term memory ---
          - name: LAKEBASE_INSTANCE_NAME
            value_from: "database"
          - name: EMBEDDING_ENDPOINT
            value: "databricks-gte-large-en"
          - name: EMBEDDING_DIMS
            value: "1024"

      # Resources this app's service principal can access
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "REPLACE_WITH_EXPERIMENT_ID"
            permission: 'CAN_MANAGE'

        - name: 'llm'
          serving_endpoint:
            name: 'databricks-claude-sonnet-4-5'
            permission: 'CAN_QUERY'

        - name: 'embedding'
          serving_endpoint:
            name: 'databricks-gte-large-en'
            permission: 'CAN_QUERY'

        - name: 'genie_space'
          genie_space:
            name: 'NorthStar Brand Copilot — Sales & Promotions'
            space_id: 'REPLACE_WITH_GENIE_SPACE_ID'
            permission: 'CAN_RUN'

        # NOTE: vector_index resource removed 2026-06-11 — northstar_vs endpoint +
        # documents_index were deleted, blocking deploy. RAG/Vector Search path is
        # disabled until the index is rebuilt. Agent degrades gracefully (agent.py _build_tools).
        - name: 'database'
          database:
            instance_name: 'northstar-lakebase'
            database_name: 'databricks_postgres'
            permission: 'CAN_CONNECT_AND_CREATE'

        - name: 'warehouse'
          sql_warehouse:
            id: 'REPLACE_WITH_WAREHOUSE_ID'
            permission: 'CAN_USE'

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    resources:
      apps:
        agent_langgraph:
          name: northstar-brand-copilot
